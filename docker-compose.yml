version: '3.8'

services:
  sandbox:
    build: .
    container_name: keygate-sandbox
    restart: unless-stopped
    ports:
      # Agent port — exposed to AI agent network
      - "127.0.0.1:9800:9800"
      # Client port — only localhost, never expose externally
      - "127.0.0.1:9801:9801"
    volumes:
      - keygate-data:/data
      - ./plugins:/plugins:ro
    environment:
      - NODE_ENV=production
      # Notification channels (uncomment to enable)
      # - KEYGATE_TELEGRAM_TOKEN=your-bot-token
      # - KEYGATE_TELEGRAM_CHAT_ID=your-chat-id
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:size=50M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Prevent core dumps (secrets in memory)
    ulimits:
      core:
        soft: 0
        hard: 0
    # Memory limit
    mem_limit: 512m
    # Disable swap (secrets should stay in RAM)
    memswap_limit: 512m

volumes:
  keygate-data:
    driver: local
